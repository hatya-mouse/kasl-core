[package]
name = "knodiq_audio_shader"
version = "0.3.9"
edition = "2024"
license = "Apache-2.0"

[lib]
name = "knodiq_audio_shader"
path = "src/lib.rs"

[dependencies]
rand = "0.9.1"
target-lexicon = "0.13.2"
knodiq_engine = { git = "https://github.com/hatya-mouse/knodiq_engine.git" }
cranelift-jit = "0.121.1"
cranelift-codegen = "0.121.1"
cranelift-module = "0.121.1"
pest = "2.8.1"
cranelift-frontend = "0.121.1"

[features]
interpreter = []
compiler = []
node = ["compiler"]

[dev-dependencies]
divan = "0.1.21"
knodiq_audio_shader = { path = "./", features = ["interpreter", "node"] }

[[test]]
name = "tests"

[[bench]]
name = "bench"
harness = false
