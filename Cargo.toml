[package]
name = "kasl"
version = "0.0.0"
edition = "2024"
license = "Apache-2.0"

[lib]
name = "kasl"
path = "src/lib.rs"

[dependencies]
cranelift = "0.129.1"
cranelift-codegen = "0.129.1"
cranelift-jit = "0.129.1"
cranelift-module = "0.129.1"
cranelift-native = "0.129.1"
hashbrown = { version = "0.16.1", features = ["serde"] }
peg = "0.8.5"
serde = { version = "1.0.228", features = ["derive"] }

[dev-dependencies]
insta = { version = "1.46.3", features = ["yaml", "redactions"] }
kasl = { path = "./" }
